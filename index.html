<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pour Maman 🌸</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Libre+Baskerville:ital@0;1&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream:   #f8f3ee;
    --warm:    #e8ddd2;
    --dust:    #c9b8a8;
    --rose:    #c4806a;
    --deep:    #3a2a24;
    --ink:     #1e1410;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--cream);
    color: var(--ink);
    font-family: 'Cormorant Garamond', Georgia, serif;
    overflow: hidden;
  }

  /* ── Cover screen ── */
  #cover {
    position: fixed; inset: 0; z-index: 100;
    background: var(--cream);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 2rem;
    animation: fadeInCover 1.2s ease both;
  }

  @keyframes fadeInCover {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  #cover.hiding {
    animation: hideCover 0.9s ease forwards;
  }
  @keyframes hideCover {
    to { opacity: 0; pointer-events: none; }
  }

  .cover-ornament {
    font-size: 2rem;
    color: var(--rose);
    letter-spacing: 0.4em;
    animation: fadeInCover 1.6s 0.3s ease both;
  }

  .cover-title {
    font-size: clamp(2.8rem, 8vw, 6rem);
    font-weight: 300;
    line-height: 1.1;
    text-align: center;
    color: var(--deep);
    animation: fadeInCover 1.6s 0.5s ease both;
  }

  .cover-title em {
    font-style: italic;
    color: var(--rose);
  }

  .cover-sub {
    font-size: 1.05rem;
    font-weight: 300;
    letter-spacing: 0.12em;
    color: var(--dust);
    text-align: center;
    line-height: 1.8;
    animation: fadeInCover 1.6s 0.8s ease both;
  }

  .cover-divider {
    width: 80px; height: 1px;
    background: var(--dust);
    animation: fadeInCover 1.6s 1s ease both;
  }

  .action-btn {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.9rem;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--cream);
    background: var(--deep);
    border: none;
    padding: 1rem 2.5rem;
    cursor: pointer;
    transition: background 0.3s, transform 0.2s;
    animation: fadeInCover 1.6s 1.2s ease both;
  }
  .action-btn:hover {
    background: var(--rose);
    transform: translateY(-2px);
  }

  /* ── Portrait screen ── */
  #portrait-screen {
    position: fixed; inset: 0; z-index: 90;
    background: var(--ink);
    display: none;
    flex-direction: column;
    align-items: center; justify-content: center;
    gap: 2rem;
  }
  #portrait-screen.visible {
    display: flex;
  }
  #portrait-screen.hiding {
    animation: hideCover 0.9s ease forwards;
  }

  #portrait-img {
    max-width: 88vw;
    max-height: 70vh;
    object-fit: contain;
    box-shadow: 0 8px 60px rgba(0,0,0,0.6);
    opacity: 0;
    transform: scale(0.97);
    transition: opacity 1s 0.2s ease, transform 1s 0.2s ease;
  }
  #portrait-img.loaded {
    opacity: 1;
    transform: scale(1);
  }

  #portrait-caption {
    font-size: 1rem;
    font-style: italic;
    font-weight: 300;
    letter-spacing: 0.1em;
    color: var(--dust);
    text-align: center;
    opacity: 0;
    transition: opacity 1s 0.8s ease;
  }
  #portrait-caption.loaded { opacity: 1; }

  #portrait-reveal-btn {
    opacity: 0;
    transition: opacity 1s 1.4s ease;
    animation: none !important; /* override cover animation */
  }
  #portrait-reveal-btn.loaded { opacity: 1; }

  /* ── Main canvas area ── */
  #app {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
  }

  #toolbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 2rem;
    background: linear-gradient(to bottom, rgba(248,243,238,0.97) 70%, transparent);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.8s 0.5s;
  }
  #toolbar.visible { opacity: 1; pointer-events: all; }

  .toolbar-title {
    font-size: 1.1rem;
    font-style: italic;
    color: var(--deep);
    letter-spacing: 0.05em;
  }

  .zoom-controls {
    display: flex; gap: 0.5rem; align-items: center;
  }
  .zoom-btn {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    width: 36px; height: 36px;
    border: 1px solid var(--dust);
    background: var(--cream);
    color: var(--deep);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .zoom-btn:hover { background: var(--deep); color: var(--cream); }

  .zoom-label {
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    color: var(--dust);
    min-width: 48px;
    text-align: center;
  }

  /* ── Mosaic viewport ── */
  #viewport {
    width: 100%; height: 100%;
    overflow: hidden;
    cursor: grab;
    position: relative;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  #viewport.ready {
    opacity: 1;
  }
  #viewport.grabbing { cursor: grabbing; }

  #mosaic-container {
    position: absolute;
    transform-origin: 0 0;
    will-change: transform;
    /* The mosaic image fills this container */
  }

  #mosaic-img {
    display: block;
    /* Replace src with your generated mosaic.jpg */
    image-rendering: auto;
  }

  /* ── Tooltip ── */
  #tooltip {
    position: fixed;
    background: var(--deep);
    color: var(--cream);
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    padding: 0.4rem 0.8rem;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 60;
    white-space: nowrap;
  }
  #tooltip.visible { opacity: 1; }

  /* ── Hint bar ── */
  #hint {
    position: fixed; bottom: 0; left: 0; right: 0;
    text-align: center;
    padding: 1.2rem;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    color: var(--dust);
    background: linear-gradient(to top, rgba(248,243,238,0.9) 70%, transparent);
    opacity: 0;
    transition: opacity 0.8s 1s;
    pointer-events: none;
  }
  #hint.visible { opacity: 1; }

  /* ── Demo placeholder (remove when you have the real mosaic) ── */
  #demo-placeholder {
    width: 4800px;
    height: 6400px;
    background:
      repeating-linear-gradient(
        45deg,
        #e8ddd2 0px, #e8ddd2 1px,
        transparent 1px, transparent 60px
      ),
      repeating-linear-gradient(
        -45deg,
        #e8ddd2 0px, #e8ddd2 1px,
        transparent 1px, transparent 60px
      ),
      var(--warm);
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  #demo-placeholder::after {
    content: "← Remplace ceci par ta mosaïque →\A mosaic.jpg";
    white-space: pre;
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    color: var(--dust);
    font-style: italic;
  }
</style>
</head>
<body>

<!-- Cover screen -->
<div id="cover">
  <div class="cover-ornament">✦ &nbsp; ✦ &nbsp; ✦</div>
  <h1 class="cover-title">Pour<br><em>Maman</em></h1>
  <div class="cover-divider"></div>
  <p class="cover-sub">
    Un portrait tissé de tous<br>
    nos moments ensemble.
  </p>
  <button class="action-btn" onclick="showPortrait()">Découvrir ↓</button>
</div>

<!-- Portrait screen -->
<div id="portrait-screen">
  <img id="portrait-img" src="me_mom.jpg" alt="Nous deux">
  <p id="portrait-caption">Regarde de plus près…</p>
  <button id="portrait-reveal-btn" class="action-btn" onclick="revealMosaic()">Voir la surprise ✦</button>
</div>

<!-- Toolbar -->
<div id="toolbar">
  <span class="toolbar-title">Pour Maman — Fête des Mères 2026</span>
  <div class="zoom-controls">
    <button class="zoom-btn" onclick="zoom(-0.3)" title="Zoom out">−</button>
    <span class="zoom-label" id="zoom-label">100%</span>
    <button class="zoom-btn" onclick="zoom(+0.3)" title="Zoom in">+</button>
    <button class="zoom-btn" onclick="resetView()" title="Reset" style="font-size:0.9rem;letter-spacing:0.05em;width:auto;padding:0 0.8rem;">↺</button>
  </div>
</div>

<!-- Main viewport -->
<div id="viewport">
  <div id="mosaic-container">
    <!--
      OPTION A — Real mosaic (uncomment when ready):
      <img id="mosaic-img" src="https://res.cloudinary.com/dmvo22ugr/image/upload/v1777301501/mosaic_np1j9m.jpg" alt="Mosaïque">

      OPTION B — Demo placeholder (remove when done):
    -->
    <div id="demo-placeholder"></div>
  </div>
</div>

<!-- Tooltip -->
<div id="tooltip"></div>

<!-- Hint -->
<div id="hint">Scroll ou pince pour zoomer &nbsp;·&nbsp; Clique et glisse pour naviguer</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let scale = 1;
let originX = 0;
let originY = 0;
let isDragging = false;
let lastX = 0, lastY = 0;
let manifest = null;   // loaded from mosaic_manifest.json

const SCALE_MIN = 0.08;
const SCALE_MAX = 8;

const viewport      = document.getElementById('viewport');
const container     = document.getElementById('mosaic-container');
const zoomLabel     = document.getElementById('zoom-label');
const tooltip       = document.getElementById('tooltip');
const toolbar       = document.getElementById('toolbar');
const hint          = document.getElementById('hint');

// ── Step 1: cover → portrait ───────────────────────────────────────────────
function showPortrait() {
  const cover = document.getElementById('cover');
  const portraitScreen = document.getElementById('portrait-screen');

  // Preload mosaic silently while portrait is showing
  const preload = new Image();
  preload.src = 'https://res.cloudinary.com/dmvo22ugr/image/upload/v1777301501/mosaic_np1j9m.jpg';

  cover.classList.add('hiding');
  setTimeout(() => {
    cover.style.display = 'none';
    portraitScreen.classList.add('visible');
    requestAnimationFrame(() => requestAnimationFrame(() => {
      document.getElementById('portrait-img').classList.add('loaded');
      document.getElementById('portrait-caption').classList.add('loaded');
      document.getElementById('portrait-reveal-btn').classList.add('loaded');
    }));
  }, 900);
}

// ── Step 2: portrait → mosaic ──────────────────────────────────────────────
function revealMosaic() {
  const portraitScreen = document.getElementById('portrait-screen');
  portraitScreen.classList.add('hiding');
  setTimeout(() => {
    portraitScreen.style.display = 'none';
    viewport.classList.add('ready');
    toolbar.classList.add('visible');
    hint.classList.add('visible');
    resetView();
  }, 900);
}

// ── Transform ──────────────────────────────────────────────────────────────
function applyTransform() {
  container.style.transform = `translate(${originX}px, ${originY}px) scale(${scale})`;
  zoomLabel.textContent = Math.round(scale * 100) + '%';
}

function clampOrigin() {
  const vw = viewport.clientWidth;
  const vh = viewport.clientHeight;
  const mosaicW = container.offsetWidth  * scale;
  const mosaicH = container.offsetHeight * scale;
  // Allow panning up to the edges with some margin
  const margin = 80;
  originX = Math.min(margin,  Math.max(originX, vw - mosaicW - margin));
  originY = Math.min(margin,  Math.max(originY, vh - mosaicH - margin));
}

function resetView() {
  const vw = viewport.clientWidth;
  const vh = viewport.clientHeight;
  const mw = container.offsetWidth  || 4800;
  const mh = container.offsetHeight || 6400;
  scale = Math.min(vw / mw, vh / mh) * 0.95;
  originX = (vw - mw * scale) / 2;
  originY = (vh - mh * scale) / 2;
  applyTransform();
}

function zoom(delta, cx, cy) {
  cx = cx ?? viewport.clientWidth  / 2;
  cy = cy ?? viewport.clientHeight / 2;

  const prevScale = scale;
  scale = Math.max(SCALE_MIN, Math.min(SCALE_MAX, scale + delta * scale));

  // Zoom toward the cursor / center
  originX = cx - (cx - originX) * (scale / prevScale);
  originY = cy - (cy - originY) * (scale / prevScale);
  clampOrigin();
  applyTransform();
}

// ── Drag ───────────────────────────────────────────────────────────────────
viewport.addEventListener('mousedown', e => {
  isDragging = true;
  lastX = e.clientX; lastY = e.clientY;
  viewport.classList.add('grabbing');
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  originX += e.clientX - lastX;
  originY += e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  clampOrigin();
  applyTransform();
});
window.addEventListener('mouseup', () => {
  isDragging = false;
  viewport.classList.remove('grabbing');
});

// ── Scroll zoom ────────────────────────────────────────────────────────────
viewport.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = -e.deltaY * 0.001;
  zoom(delta, e.clientX, e.clientY);
}, { passive: false });

// ── Pinch zoom (touch) ─────────────────────────────────────────────────────
let lastPinchDist = null;
let lastTouchMid = null;

function getTouchMid(touches) {
  return {
    x: (touches[0].clientX + touches[1].clientX) / 2,
    y: (touches[0].clientY + touches[1].clientY) / 2,
  };
}
function getTouchDist(touches) {
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.sqrt(dx*dx + dy*dy);
}

viewport.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    lastPinchDist = getTouchDist(e.touches);
    lastTouchMid  = getTouchMid(e.touches);
  } else if (e.touches.length === 1) {
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
    isDragging = true;
  }
}, { passive: true });

viewport.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 2) {
    isDragging = false;
    const dist = getTouchDist(e.touches);
    const mid  = getTouchMid(e.touches);
    const delta = (dist - lastPinchDist) / lastPinchDist;
    zoom(delta * 0.6, mid.x, mid.y);
    lastPinchDist = dist;
    lastTouchMid  = mid;
  } else if (isDragging && e.touches.length === 1) {
    originX += e.touches[0].clientX - lastX;
    originY += e.touches[0].clientY - lastY;
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
    clampOrigin();
    applyTransform();
  }
}, { passive: false });

viewport.addEventListener('touchend', () => {
  lastPinchDist = null;
  isDragging = false;
});

// ── Tile hover tooltip (from manifest) ────────────────────────────────────
async function loadManifest() {
  try {
    const r = await fetch('mosaic_manifest.json');
    manifest = await r.json();
  } catch (_) {
    // No manifest — tooltip won't show photo names, that's fine
  }
}

viewport.addEventListener('mousemove', e => {
  if (!manifest || isDragging) { tooltip.classList.remove('visible'); return; }

  // Convert screen coords to mosaic image coords
  const mx = (e.clientX - originX) / scale;
  const my = (e.clientY - originY) / scale;

  const tileW = (container.offsetWidth  || 4800) / manifest.grid_cols;
  const tileH = (container.offsetHeight || 6400) / manifest.grid_rows;

  const col = Math.floor(mx / tileW);
  const row = Math.floor(my / tileH);

  const key = `${row},${col}`;
  const filename = manifest.grid[key];

  if (filename) {
    const name = filename.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ');
    tooltip.textContent = name;
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top  = (e.clientY - 10) + 'px';
    tooltip.classList.add('visible');
  } else {
    tooltip.classList.remove('visible');
  }
});
viewport.addEventListener('mouseleave', () => tooltip.classList.remove('visible'));

// ── Init ───────────────────────────────────────────────────────────────────
loadManifest();
// resetView is called after cover hides
</script>
</body>
</html>
